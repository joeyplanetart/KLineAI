upstream klineai_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 10436;
    server_name 149.71.241.228;

    root /Users/joey/KLineAI/frontend/dist;
    index index.html;

    # Frontend -> Backend API proxy (same-origin)
    location /api/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_pass http://klineai_backend;
    }

    # SPA fallback for React Router
    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 10438;
    server_name 149.71.241.228;

    # Optional direct API entry (keep compatibility)
    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_pass http://klineai_backend;
    }
}
