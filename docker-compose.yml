version: '3.8'

services:
  db:
    image: timescale/timescaledb:latest-pg14
    container_name: klineai_db
    environment:
      POSTGRES_USER: klineai_user
      POSTGRES_PASSWORD: klineai_password
      POSTGRES_DB: klineai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: klineai_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
